server {
    listen 88;
    server_name _;

    root /usr/share/nginx/html;
    index lottery-prediction.html;

    location / {
        try_files $uri $uri/ /lottery-prediction.html;
    }

    # 健康检查
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
